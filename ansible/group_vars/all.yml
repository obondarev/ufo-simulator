# Cumulus default credentials
cumulus_user: cumulus
cumulus_default_password: cumulus
cumulus_new_password: password

redfish_username: admin
redfish_password: password

vm_base_mac: "52:54:00:12"
bridge_name: br-mgmt
vm_vcpus: 6
vm_ram: 6144
vm_disk_size: 60
vm_port_count: 4
disk_path: /var/lib/libvirt/images

sg_base_mac: "52:54:00:13"
sg_port_count: 2
sg_image_url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
sg_image: "/var/lib/libvirt/images/noble-server-cloudimg-amd64.img"
sg_disk_size: 60

netris_auth_token: <token from webapi>
netris_admin_username: netris
netris_admin_password: password
netris_license: ""
netris_operator_chart_repo: oci://registry.ci.mirantis.com/k0rdent-bm/charts/netris-operator
netris_operator_chart_version: 0.0.1-f431da9
netris_operator_image: registry.ci.mirantis.com/k0rdent-bm/images/netris-operator
netris_operator_image_tag: 0.0.1-f431da9.1770637678

loopback_base: "192.169"
management_base: "192.168"
loopback_base_switch: "192.169.0"
management_base_switch: "192.168.0"
management_gateway_switch: "{{ management_base_switch }}.254"

loopback_base_server: "192.169.1"
management_base_server: "192.168.1"
management_gateway_server: "{{ management_base_server }}.254"

loopback_base_sg: "192.169.2"
management_base_sg: "192.168.2"
management_gateway_sg: "{{ management_base_sg }}.254"
management_dns_server: 4.2.2.1

ext_base: 192.167
ext_base_sg: 192.167.2
ext_base_gateway_sg: "{{ ext_base_sg }}.254"
ext_sg_netmask: 24
ext_nat: "{{ ext_base_sg }}.0"

ext_base_switch: "{{ ext_base }}.3"
ext_base_gateway_switch_gtw: "{{ ext_base_switch }}.1"
ext_base_gateway_switch: "{{ ext_base_switch }}.254"
fabric_gateway_ip: "{{ ext_base_switch }}.100"

child_public_cidr: 192.167.100.0/24

pxe_base: 172.16.81

br_pxe_name: br-pxe
br_pxe_ip: 172.16.81.254
br_pxe_netmask: 24
br_pxe_phys_interface: ""

br_mgmt_name: br-mgmt

br_mgmt_netmask: 24
# NIC enslaved to br-mgmt in netplan; also included in cloud-init netplan prune list when set.
br_mgmt_phys_interface: ""
# Extra interface names (stanza key or set-name) to strip addresses/nameservers from in
# /etc/netplan/50-cloud-init.yaml (merged with br_mgmt_phys_interface).
netplan_cloudinit_prune_ifaces: []

br_ext_name: br-ext
br_ext_netmask: 24
br_ext_phys_interface: ""


ufo_dev_mode: false
ufo_chart_repo: oci://registry.ci.mirantis.com/k0rdent-bm/charts/unified-fabric-operator
ufo_chart_version: 0.0.1-8586bfe
ufo_image_tag: 0.0.1-8586bfe.1769198335
ufo_fabric_backend: netris

verity_operator_mode: false
verity_operator_chart_repo: oci://registry.ci.mirantis.com/k0rdent-bm/charts/verity-operator
verity_operator_chart_version: 0.0.1-408dd13
verity_operator_image_tag: 0.0.1-408dd13.1774008551
verity_api_username: admin
verity_api_password: vnc1234

netris_controller_ip: 10.172.1.100
netris_web_frontend_ip: 10.172.1.101
netris_web_api_url: "http://{{ netris_web_frontend_ip }}"

kubeconfig_path: "/root/.kube/config"

docker_image_proxy: https://dockerproxy.artifactory-eu.mcp.mirantis.net

frr:
  enabled: true
  bgp:
    update_source: '{{ ext_base_gateway_switch }}'
    enabled: true
    router_id: '{{ ext_base_gateway_switch }}'
    asn: 64513
    sdn:
      asn: 64512
      peer_ranges:
      - "{{ ext_base_switch }}.0/24"


cats_mgmt_cidr: "10.11.0.0/24"
dogs_mgmt_cidr: "10.12.0.0/24"

external_gateway_bgp:
  local_ip: "{{ fabric_gateway_ip }}/{{ ext_sg_netmask }}"
  remote_ip: "{{ ext_base_gateway_switch_gtw }}/{{ ext_sg_netmask }}"
  prefix_list_outbound:
    - "permit {{ cats_mgmt_cidr }}"
    - "permit {{ dogs_mgmt_cidr }}"

host_masquerade_cidrs:
  - "{{ management_base_sg }}.0/{{ br_mgmt_netmask }}"
  - "{{ ext_base_sg }}.0/{{ ext_sg_netmask }}"
  - "{{ cats_mgmt_cidr }}"
  - "{{ dogs_mgmt_cidr }}"

sdn_provider: "netris" # or "verity"
