apiVersion: ufo.mirantis.com/v1alpha1
kind: NetworkBundle
metadata:
  name: dogs
  namespace: kcm-system
spec:
  vpc: dogs
  clusterName: dogs-cluster
  allocations:
    subnetAllocations:
      - name: dogs-mgmt-subnet
        prefixLength: 24
        subnetpool: default
        subnet: dogs-mgmt-subnet
        network: dogs-mgmt-net
        gateway: true
      - name: dogs-data-subnet
        prefixLength: 24
        subnetpool: default
        subnet: dogs-data-subnet
        network: dogs-data-net
    networks:
      - name: dogs-mgmt-net
        type: evpn
        evpn:
          type: l2
        vlan:
          id: "auto"
        dnsServers:
        - "4.2.2.1"
      - name: dogs-data-net
        type: evpn
        evpn:
          type: l2
        vlan:
          id: "auto"
        dnsServers:
        - "4.2.2.1"
  networkv2:
    ethernets:
      eth1:
        match:
          macAddress:
            fromAnnotation:
              object: baremetalhost
              annotation: net_interface_mgmt_0_mac
        mtu: 1500
      eth2:
        match:
          macAddress:
            fromAnnotation:
              object: baremetalhost
              annotation: net_interface_mgmt_1_mac
        mtu: 1500
      eth3:
        match:
          macAddress:
            fromAnnotation:
              object: baremetalhost
              annotation: net_interface_data_0_mac
        mtu: 1500
      eth4:
        match:
          macAddress:
            fromAnnotation:
              object: baremetalhost
              annotation: net_interface_data_1_mac
        mtu: 1500
    bonds:
      bond0:
       parameters:
         mode: active-backup
       interfaces:
        - eth1
        - eth2
       addresses:
        - ipFromSubnet:
            name: dogs-mgmt-subnet
       gatewayv4:
         gatewayFromSubnet:
           name: dogs-mgmt-subnet
       mtu: 1500
       nameservers:
         addresses:
           dnsFromNetwork:
             name: dogs-mgmt-net
      bond1:
       parameters:
         mode: active-backup
       interfaces:
        - eth3
        - eth4
       mtu: 1500
    vlans:
      data:
        id:
          vlanIdFromNetwork:
            name: dogs-data-net
        link: bond1
        addresses:
         - ipFromSubnet:
             name: dogs-data-subnet
        mtu: 1500
