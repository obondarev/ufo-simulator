---
apiVersion: ufo.mirantis.com/v1alpha1
kind: SubnetPoolAllocation
metadata:
  name: default
  namespace: kcm-system
spec:
  ip_version: 4
  prefix_length: 23
  source:
    subnetpool:
      name: default
  target:
    subnetpool:
      name: default
      namespace: cats
      tags:
        - default
