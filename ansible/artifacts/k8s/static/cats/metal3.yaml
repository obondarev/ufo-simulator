spec:
  template:
    spec:
      version: v1.34.3+k0s.0
      args:
        - --kubelet-extra-args="--node-ip={{ ds.meta_data.provisioningIP }}"
        - --labels="metal3.io/uuid={{ ds.meta_data.metal3_uuid }}"
        - --force=false
      preStartCommands:
        - sudo useradd -G sudo -s /bin/bash -d /home/rescue -p $(openssl passwd -1 rescue) rescue
        - sudo mkdir -vp /home/rescue/.ssh/
        - sudo chown rescue /home/rescue/.ssh/authorized_keys
        - /usr/bin/sleep 180
      files:
      - content: |
          PasswordAuthentication yes
        path: /etc/ssh/sshd_config.d/99-cloudimg-settings.conf
        permissions: "0644"
