# Source: capm3-standalone-cp/templates/machinedeployment.yaml
apiVersion: cluster.x-k8s.io/v1beta1
kind: MachineDeployment
metadata:
  name: cats-cluster-md
  namespace: cats
spec:
  clusterName: cats-cluster
  replicas: 1
  selector:
    matchLabels:
      cluster.x-k8s.io/cluster-name: cats-cluster
  template:
    metadata:
      labels:
        cluster.x-k8s.io/cluster-name: cats-cluster
    spec:
      version: v1.34.3+k0s.0
      clusterName: cats-cluster
      bootstrap:
        configRef:
          apiVersion: bootstrap.cluster.x-k8s.io/v1beta1
          kind: K0sWorkerConfigTemplate
          name: cats-cluster-machine-config
          namespace: cats
      infrastructureRef:
        apiVersion: infrastructure.cluster.x-k8s.io/v1beta1
        kind: Metal3MachineTemplate
        name: cats-cluster-worker-mt
        namespace: cats
